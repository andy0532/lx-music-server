name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Inject users config
        env:
          KV_NAMESPACE_ID: ${{ vars.KV_NAMESPACE_ID }}
          LX_USER_ADMIN: ${{ secrets.LX_USER_ADMIN }}
          # 新增用户时在此追加一行：LX_USER_xxx: ${{ secrets.LX_USER_xxx }}
        run: |
          sed -i "s/KV_NAMESPACE_ID_PLACEHOLDER/${{ vars.KV_NAMESPACE_ID }}/g" wrangler.toml
          python3 - <<'EOF'
          import os, json

          users = []
          for k, v in os.environ.items():
              if not k.startswith('LX_USER_') or not v:
                  continue
              name = k.removeprefix('LX_USER_').lower()
              try:
                  users.append({"name": name, **json.loads(v)})
              except json.JSONDecodeError:
                  users.append({"name": name, "password": v})

          users_json = json.dumps(users)

          with open('wrangler.toml', 'r') as f:
              content = f.read()

          content = content.replace('"LX_USERS_PLACEHOLDER"', json.dumps(users_json))

          with open('wrangler.toml', 'w') as f:
              f.write(content)
          EOF

      - name: Deploy
        run: pnpm wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
