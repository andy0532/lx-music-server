name: Deploy to Cloudflare Workers

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')
    env:
      WRANGLER_SEND_METRICS: "false"
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Inject users config
        env:
          KV_NAMESPACE_ID: ${{ vars.KV_NAMESPACE_ID }}
          LX_USERS: ${{ secrets.LX_USERS }}
        run: |
          sed -i "s/KV_NAMESPACE_ID_PLACEHOLDER/${{ vars.KV_NAMESPACE_ID }}/g" wrangler.toml

          # LX_USERS secret 格式:
          #   简单模式: user1:password1,user2:password2
          #   JSON 模式: [{"name":"user1","password":"xxx"},{"name":"user2","password":"yyy","maxSnapshotNum":30}]
          python3 - <<'EOF'
          import os, json

          raw = os.environ.get("LX_USERS", "")
          if not raw:
              users = []
          elif raw.startswith("["):
              users = json.loads(raw)
          else:
              # user:password,user:password 格式
              users = []
              for pair in raw.split(","):
                  pair = pair.strip()
                  if not pair:
                      continue
                  parts = pair.split(":", 1)
                  users.append({"name": parts[0], "password": parts[1] if len(parts) > 1 else ""})

          users_json = json.dumps(users)

          with open('wrangler.toml', 'r') as f:
              content = f.read()

          content = content.replace('"LX_USERS_PLACEHOLDER"', json.dumps(users_json))

          with open('wrangler.toml', 'w') as f:
              f.write(content)
          EOF

      - name: Deploy
        run: pnpm wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}